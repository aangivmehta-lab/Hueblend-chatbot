    });
    chatWrap.appendChild(qrWrap);
  }

  if (role === 'ai' && content.length > 50) {
    const msgIdx = history.length - 1;
    setTimeout(() => addFeedback(msgIdx), 300);
  }

  chatWrap.scrollTop = chatWrap.scrollHeight;
  return bubble;
}

// ── FEEDBACK ─────────────────────────────────────────────────
function addFeedback(msgIdx) {
  const wrap = document.createElement('div');
  wrap.className = 'feedback-row';
  wrap.innerHTML = `
    <span class="feedback-label">Was this helpful?</span>
    <button class="feedback-btn" onclick="submitFeedback(this,'helpful',${msgIdx})">👍</button>
    <button class="feedback-btn" onclick="submitFeedback(this,'not_helpful',${msgIdx})">👎</button>
    <span class="feedback-thanks"></span>
  `;
  chatWrap.appendChild(wrap);
  chatWrap.scrollTop = chatWrap.scrollHeight;
}

function submitFeedback(btn, rating, msgIdx) {
  const row = btn.parentElement;
  if (row.dataset.voted) return;
  row.dataset.voted = 'true';
  row.querySelectorAll('.feedback-btn').forEach(b => b.disabled = true);
  btn.classList.add(rating === 'helpful' ? 'active-up' : 'active-down');
  const thanks = row.querySelector('.feedback-thanks');
  thanks.style.display = 'inline';
  thanks.textContent = rating === 'helpful' ? 'Glad it helped!' : "Got it — I'll improve!";
  const msgContent = history[msgIdx] ? history[msgIdx].content.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim().slice(0,300) : '';
  logToSheet({ name:'[FEEDBACK]', email:rating, brandType:sessionMeta.brandType||'', problemCategory:sessionMeta.problemCategory||'', diagnosisSummary:msgContent, ctaClicked:`feedback-${rating}`, transcript:`Rated: ${rating} | ${msgContent}` });
}

async function submitLead() {
  const name  = document.getElementById('leadName').value.trim();

  document.getElementById('leadSubmit').textContent = 'Saving...';

  chatWrap.scrollTop = chatWrap.scrollHeight;

function skipLead() {
  const card = document.getElementById('leadCard');
  if (card) {
    logToSheet({ name:'(skipped)', email:'(skipped)', transcript:history.map(m=>`[${m.role.toUpperCase()}]: ${m.content.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim()}`).join('\n\n'), ctaClicked, ...sessionMeta });

  }
}

async function submitBooking() {
  const name    = document.getElementById('bookName').value.trim();
  const email   = document.getElementById('bookEmail').value.trim();
  const brand   = document.getElementById('bookBrand').value.trim();
  const time    = document.getElementById('bookTime').value;
  const message = document.getElementById('bookMessage').value.trim();

  if (!name) {
    const el = document.getElementById('bookName');
    el.style.borderColor = 'rgba(232,90,90,0.6)';
    el.placeholder = 'Please enter your name';
    return;
  }
  if (!email || !email.includes('@')) {
    const el = document.getElementById('bookEmail');
    el.style.borderColor = 'rgba(232,90,90,0.6)';
    el.placeholder = 'Please enter a valid email';
    return;
  }

  const btn = document.getElementById('bookSubmit');
  btn.disabled    = true;
  btn.textContent = 'Sending...';

  try {
    await logToSheet({
      name,
      email,
      brandType:        brand || sessionMeta.brandType || 'Not specified',
      problemCategory:  '[BOOKING REQUEST]',
      diagnosisSummary: message || 'No message provided',
      ctaClicked:       'book-call',
      transcript:       `Preferred time: ${time || 'not specified'}`
    });
    saveUserMemory({ name, email });
  } catch(err) {
    console.error('Booking save failed:', err);
  }

  document.getElementById('bookingCard').innerHTML = `
    <div class="booking-success">
      <div class="booking-success-icon">✓</div>
      <h3>Request received!</h3>
      <p>We'll reach out within 24 hours<br/>to schedule your strategy call.</p>
    </div>
  `;
  chatWrap.scrollTop = chatWrap.scrollHeight;
}

// ── SHEET LOGGER ─────────────────────────────────────────────
async function logToSheet(data) {
  if (!SHEET_WEBHOOK_URL || SHEET_WEBHOOK_URL.includes('YOUR_')) {
    console.log('Sheet not connected:', data);
    return;
  }
  try {
    await fetch(SHEET_WEBHOOK_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...data, timestamp: new Date().toISOString() })
    });
  } catch(e) { console.error('Sheet log failed:', e); }
}

function showTyping() {

function removeTyping() {

}

// ── AUTO SAVE ─────────────────────────────────────────────────
function autoSaveConversation() {
  const transcript = history.map(m =>
    '[' + m.role.toUpperCase() + ']: ' +
    m.content.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim()
  ).join('\n\n');
  const mem = getUserMemory() || {};
  logToSheet({
    name:             mem.name  || '(anonymous)',
    email:            mem.email || '(not provided)',
    brandType:        sessionMeta.brandType        || '(in progress)',
    problemCategory:  sessionMeta.problemCategory  || '(in progress)',
    diagnosisSummary: sessionMeta.diagnosisSummary || '(in progress)',
    ctaClicked:       ctaClicked || 'none',
    transcript
  });
}

// ── SEND MESSAGE ──────────────────────────────────────────────
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isTyping) return;

  currentLang = detectLang(text);

  if (history.length === 0) {
    hero.style.display    = 'none';
    disclaimer.style.display = 'block';
    const wc = document.getElementById('welcomeCard');
    if (wc) wc.remove();
  }

  addMessage('user', text);
  history.push({ role: 'user', content: text });
  msgInput.value = '';
  msgInput.style.height = 'auto';

  isTyping = true;
  sendBtn.disabled = true;
  showTyping();

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model:   'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system:  SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await response.json();
    let reply = (data.content || []).map(b => b.text || '').join('') || 'Something went wrong. Try again.';

    const meta = extractMeta(reply);
    if (meta) {
      sessionMeta       = meta;
      diagnosisDelivered = true;
      reply             = stripMeta(reply);
      const tx = history.map(m => `[${m.role.toUpperCase()}]: ${m.content.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim()}`).join('\n\n');
      saveDiagnosis(meta, tx);
    }

    removeTyping();
    history.push({ role: 'assistant', content: reply });

    const isFirst = history.length <= 2;
    const qr = isFirst ? [
      'Fashion brand, getting views but no sales',
      'Beauty D2C, running ads but low ROI',
      'Lifestyle brand, growing followers but zero revenue'
    ] : [];

    addMessage('ai', reply, qr);
    autoSaveConversation();

    if (diagnosisDelivered) {
      setTimeout(showLeadCapture, 600);
      setTimeout(showBookCallButton, 1200);
      diagnosisDelivered = false;
    }
  } catch(err) {
    removeTyping();
    addMessage('ai', 'Something went wrong connecting to the advisor. Please refresh and try again.');
  }

  isTyping = false;
  sendBtn.disabled = false;
  msgInput.focus();
}

  if (mem && mem.name) {

    if (last) {
      const daysAgo = Math.floor((Date.now() - new Date(last.date)) / 86400000);

      hero.style.display       = 'none';
      disclaimer.style.display = 'block';
      addMessage('ai',
        'Welcome back, <strong>' + mem.name + '</strong>!<br/><br/>' +
        when + ', we identified: <em>' + last.diagnosisSummary + '</em>.<br/><br/>' +
        'Has anything changed — or are you facing a new challenge?',
        ['Yes, new problem now', 'Still working on the same issue', 'Start a fresh diagnosis']
      );
    } else {
      hero.style.display       = 'none';
      disclaimer.style.display = 'block';
      addMessage('ai',
        'Welcome back, <strong>' + mem.name + '</strong>! Good to see you again.<br/><br/>' +
        '<strong>What marketing challenge are you working on today?</strong>',
        ['SEO — not ranking on Google', 'Meta ads — low ROI', 'Content — no engagement', 'Conversions — traffic but no sales']
      );
