<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Why My Brand Isn't Selling — Hueblend</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0D0D0F; --surface: #161618; --surface2: #1E1E21;
    --border: rgba(255,255,255,0.07); --border-active: rgba(255,255,255,0.15);
    --text: #F0EDE8; --muted: rgba(240,237,232,0.45);
    --accent: #E8845A; --tag-bg: rgba(232,132,90,0.12); --tag-text: #E8845A;
    --user-bubble: #1C1C20;
  }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
  body { display: flex; flex-direction: column; min-height: 100vh; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 10; }
  .logo { display: flex; align-items: center; }
  .header-badge { font-size: 11px; padding: 4px 12px; border-radius: 99px; border: 1px solid var(--border); color: var(--muted); letter-spacing: 0.04em; }
  .hero { text-align: center; padding: 56px 24px 36px; max-width: 600px; margin: 0 auto; }
  .hero-tag { display: inline-block; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--tag-text); background: var(--tag-bg); padding: 5px 14px; border-radius: 99px; margin-bottom: 20px; }
  .hero h1 { font-family: 'Instrument Serif', serif; font-size: clamp(28px, 5vw, 44px); font-weight: 400; line-height: 1.15; color: var(--text); margin-bottom: 14px; }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero p { font-size: 15px; color: var(--muted); line-height: 1.7; max-width: 440px; margin: 0 auto; }
  .chat-wrap { flex: 1; max-width: 720px; width: 100%; margin: 0 auto; padding: 0 16px 140px; display: flex; flex-direction: column; }
  .message { display: flex; gap: 12px; padding: 10px 0; animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .message.user { flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; margin-top: 2px; }
  .avatar.ai { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); font-size: 10px; letter-spacing: 0.05em; }
  .avatar.user { background: var(--accent); color: #fff; }
  .bubble { max-width: 82%; padding: 12px 16px; border-radius: 14px; font-size: 14.5px; line-height: 1.7; }
  .bubble.ai { background: var(--surface); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; color: var(--text); }
  .bubble.user { background: var(--user-bubble); border: 1px solid var(--border-active); border-radius: 14px 4px 14px 14px; color: var(--text); }
  .bubble strong { color: var(--text); font-weight: 600; }
  .bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .bubble .diagnosis-label { font-size: 11px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; font-weight: 600; }
  .bubble .action-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .bubble .action-item:last-child { border-bottom: none; }
  .action-num { width: 22px; height: 22px; border-radius: 50%; background: var(--tag-bg); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 1px; }
  .bubble .intel-block { display: flex; flex-direction: column; gap: 10px; margin: 10px 0; }
  .bubble .intel-row { display: flex; gap: 10px; align-items: flex-start; font-size: 13.5px; line-height: 1.65; }
  .intel-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; padding: 3px 8px; border-radius: 6px; flex-shrink: 0; margin-top: 2px; }
  .intel-tag.eq { background: rgba(92,201,138,0.15); color: #5CC98A; }
  .intel-tag.iq { background: rgba(90,148,232,0.15); color: #5A94E8; }
  .intel-tag.cq { background: rgba(201,185,154,0.15); color: #C9B99A; }
  .typing { display: flex; gap: 5px; align-items: center; padding: 8px 0; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s ease infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }
  .input-bar { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, var(--bg) 70%, transparent); padding: 16px; }
  .input-inner { max-width: 720px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; background: var(--surface); border: 1px solid var(--border-active); border-radius: 14px; padding: 10px 14px; transition: border-color 0.2s; }
  .input-inner:focus-within { border-color: rgba(232,132,90,0.4); }
  textarea { flex: 1; background: none; border: none; outline: none; resize: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14.5px; line-height: 1.5; max-height: 120px; overflow-y: auto; min-height: 22px; }
  textarea::placeholder { color: var(--muted); }
  .send-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.15s; color: white; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.94); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .send-btn svg { width: 15px; height: 15px; }
  .quick-replies { display: flex; flex-wrap: wrap; gap: 8px; padding: 6px 0 0 44px; }
  .qr-btn { font-size: 12.5px; padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border-active); background: none; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .qr-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  .disclaimer { text-align: center; font-size: 11px; color: var(--muted); padding-top: 6px; max-width: 720px; margin: 0 auto; }
  .lead-card { background: var(--surface); border: 1px solid rgba(232,132,90,0.25); border-radius: 16px; padding: 20px 22px; margin: 8px 0 8px 44px; animation: fadeUp 0.4s ease both; }
  .lead-card-title { font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }
  .lead-card-sub { font-size: 13.5px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
  .lead-fields { display: flex; flex-direction: column; gap: 10px; }
  .lead-input { width: 100%; padding: 10px 14px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border-active); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .lead-input:focus { border-color: rgba(232,132,90,0.5); }
  .lead-input::placeholder { color: var(--muted); }
  .lead-submit { width: 100%; padding: 11px; border-radius: 10px; background: var(--accent); border: none; cursor: pointer; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; margin-top: 4px; transition: opacity 0.2s, transform 0.15s; }
  .lead-submit:hover { opacity: 0.88; }
  .lead-submit:active { transform: scale(0.98); }
  .lead-submit:disabled { opacity: 0.45; cursor: not-allowed; }
  .lead-success { display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: var(--muted); padding: 6px 0; }
  .lead-success-dot { width: 8px; height: 8px; border-radius: 50%; background: #5CC98A; flex-shrink: 0; }
  .lead-skip { text-align: center; margin-top: 10px; }
  .lead-skip button { background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--muted); text-decoration: underline; text-underline-offset: 3px; }
  .feedback-row { display: flex; align-items: center; gap: 8px; padding: 4px 0 4px 44px; animation: fadeUp 0.3s ease both; }
  .feedback-label { font-size: 12px; color: var(--muted); }
  .feedback-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: 14px; transition: all 0.15s; }
  .feedback-btn:hover { background: var(--surface2); border-color: var(--border-active); }
  .feedback-btn.active-up { background: rgba(92,201,138,0.15); border-color: #5CC98A; }
  .feedback-btn.active-down { background: rgba(232,90,90,0.15); border-color: #E85A5A; }
  .feedback-thanks { font-size: 12px; color: var(--muted); display: none; }
  .book-call-btn { display: inline-flex; align-items: center; gap: 8px; margin: 8px 0 8px 44px; padding: 10px 18px; border-radius: 10px; background: rgba(232,132,90,0.12); border: 1px solid rgba(232,132,90,0.3); color: var(--accent); font-size: 13.5px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; animation: fadeUp 0.4s ease both; }
  .book-call-btn:hover { background: rgba(232,132,90,0.2); }
  .booking-card { background: var(--surface); border: 1px solid rgba(232,132,90,0.3); border-radius: 16px; padding: 20px 22px; margin: 8px 0 8px 44px; animation: fadeUp 0.4s ease both; }
  .booking-title { font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }
  .booking-sub { font-size: 13.5px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
  .booking-fields { display: flex; flex-direction: column; gap: 10px; }
  .booking-row { display: flex; gap: 10px; }
  .booking-row .lead-input { flex: 1; }
  .booking-submit { width: 100%; padding: 11px; border-radius: 10px; background: var(--accent); border: none; cursor: pointer; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; margin-top: 4px; transition: opacity 0.2s, transform 0.15s; }
  .booking-submit:hover { opacity: 0.88; }
  .booking-submit:disabled { opacity: 0.45; cursor: not-allowed; }
</style>
</head>

function saveUserMemory(data) {
  try {
    const existing = getUserMemory() || {};
    const updated = { ...existing, ...data, lastVisit: new Date().toISOString() };
    if (!updated.firstVisit) updated.firstVisit = new Date().toISOString();
    if (!updated.sessions) updated.sessions = 0;
    updated.sessions++;
    if (!updated.diagnoses) updated.diagnoses = [];
    localStorage.setItem(MEMORY_KEY, JSON.stringify(updated));
  } catch(e) {}
}
function getUserMemory() {
  try { const r = localStorage.getItem(MEMORY_KEY); return r ? JSON.parse(r) : null; }
  catch(e) { return null; }
}
function saveDiagnosis(meta, transcript) {
  try {
    const mem = getUserMemory() || {};
    if (!mem.diagnoses) mem.diagnoses = [];

}

function addMessage(role, content, quickReplies = []) {
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;
  const av = document.createElement('div');
  av.className = `avatar ${role}`;
  av.textContent = role === 'ai' ? 'HB' : 'You';
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.innerHTML = content;
  bubble.querySelectorAll('[data-cta]').forEach(el => {
    el.style.cursor = 'pointer';
    el.addEventListener('click', () => { ctaClicked = el.dataset.cta; });
  });
  if (role === 'ai') { wrap.appendChild(av); wrap.appendChild(bubble); }
  else { wrap.appendChild(bubble); wrap.appendChild(av); }
  chatWrap.appendChild(wrap);
  if (quickReplies.length > 0) {
    const qrWrap = document.createElement('div');
    qrWrap.className = 'quick-replies';
    quickReplies.forEach(qr => {
      const btn = document.createElement('button');
      btn.className = 'qr-btn'; btn.textContent = qr;
      btn.onclick = () => { msgInput.value = qr; sendMessage(); qrWrap.remove(); };
      qrWrap.appendChild(btn);
    });
    chatWrap.appendChild(qrWrap);
  }
  if (role === 'ai' && content.length > 50) {
    const msgIdx = history.length - 1;
    setTimeout(() => addFeedback(msgIdx), 300);
  }
  chatWrap.scrollTop = chatWrap.scrollHeight;
  return bubble;
}

function addFeedback(msgIdx) {
  const wrap = document.createElement('div');
  wrap.className = 'feedback-row';
  wrap.innerHTML = `
    <span class="feedback-label">Was this helpful?</span>
    <button class="feedback-btn" onclick="submitFeedback(this, 'helpful', ${msgIdx})">👍</button>
    <button class="feedback-btn" onclick="submitFeedback(this, 'not_helpful', ${msgIdx})">👎</button>
    <span class="feedback-thanks"></span>
  `;
  chatWrap.appendChild(wrap);
  chatWrap.scrollTop = chatWrap.scrollHeight;
}

function submitFeedback(btn, rating, msgIdx) {
  const row = btn.parentElement;
  if (row.dataset.voted) return;
  row.dataset.voted = 'true';
  row.querySelectorAll('.feedback-btn').forEach(b => b.disabled = true);
  btn.classList.add(rating === 'helpful' ? 'active-up' : 'active-down');
  const thanks = row.querySelector('.feedback-thanks');
  thanks.style.display = 'inline';
  thanks.textContent = rating === 'helpful' ? 'Glad it helped!' : "Got it — I'll improve!";
  const msgContent = history[msgIdx] ? history[msgIdx].content.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim().slice(0, 300) : '';
  logToSheet({ name: '[FEEDBACK]', email: rating, brandType: sessionMeta.brandType || '', problemCategory: sessionMeta.problemCategory || '', diagnosisSummary: msgContent, ctaClicked: `feedback-${rating}`, transcript: `Rated: ${rating} | ${msgContent}` });
}

async function submitLead() {
  const name = document.getElementById('leadName').value.trim();
  const email = document.getElementById('leadEmail').value.trim();
  if (!name || !email || !email.includes('@')) {
    document.getElementById('leadEmail').style.borderColor = 'rgba(232,90,90,0.6)'; return;
  }
  document.getElementById('leadSubmit').disabled = true;
  document.getElementById('leadSubmit').textContent = 'Saving...';
  const transcript = history.map(m => `[${m.role.toUpperCase()}]: ${m.content.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim()}`).join('\n\n');
  await logToSheet({ name, email, transcript, ctaClicked, ...sessionMeta });
  saveUserMemory({ name, email });
  document.getElementById('leadCard').innerHTML = `<div class="lead-success"><div class="lead-success-dot"></div><span>Saved! Your diagnosis report is on its way.</span></div>`;
  chatWrap.scrollTop = chatWrap.scrollHeight;
}

function skipLead() {
  const card = document.getElementById('leadCard');
  if (card) {
    logToSheet({ name: '(skipped)', email: '(skipped)', transcript: history.map(m => `[${m.role.toUpperCase()}]: ${m.content.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim()}`).join('\n\n'), ctaClicked, ...sessionMeta });
    card.remove();
  }
}

async function logToSheet(data) {
  if (!SHEET_WEBHOOK_URL || SHEET_WEBHOOK_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
    console.log('Sheet not connected:', data); return;
  }
  try {
    await fetch(SHEET_WEBHOOK_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...data, timestamp: new Date().toISOString() }) });
  } catch(e) { console.error('Sheet log failed:', e); }
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'message ai'; wrap.id = 'typing-wrap';
  const av = document.createElement('div');
  av.className = 'avatar ai'; av.textContent = 'HB';
  const dot = document.createElement('div');
  dot.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  wrap.appendChild(av); wrap.appendChild(dot);
  chatWrap.appendChild(wrap);
  chatWrap.scrollTop = chatWrap.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-wrap');
  if (el) el.remove();
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isTyping) return;
  if (history.length === 0) { hero.style.display = 'none'; disclaimer.style.display = 'block'; }
  addMessage('user', text);
  msgInput.value = ''; msgInput.style.height = 'auto';
  history.push({ role: 'user', content: text });// Auto-save conversation to sheet after every AI response
autoSaveConversation();
  isTyping = true; sendBtn.disabled = true;
  showTyping();
  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'gemini-2.5-flash', max_tokens: 1000, system: SYSTEM_PROMPT, messages: history })
    });
    const data = await response.json();
    let reply = data.content?.map(b => b.text || '').join('') || 'Something went wrong. Try again.';
    const meta = extractMeta(reply);
    if (meta) {
      sessionMeta = meta; diagnosisDelivered = true; reply = stripMeta(reply);
      const tx = history.map(m => `[${m.role.toUpperCase()}]: ${m.content.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim()}`).join('\n\n');
      saveDiagnosis(meta, tx);
    }
      function autoSaveConversation() {
  const transcript = history.map(m =>
    '[' + m.role.toUpperCase() + ']: ' +
    m.content.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim()
  ).join('\n\n');

  const mem = getUserMemory() || {};

  logToSheet({
    name: mem.name || '(anonymous)',
    email: mem.email || '(not provided)',
    brandType: sessionMeta.brandType || '(in progress)',
    problemCategory: sessionMeta.problemCategory || '(in progress)',
    diagnosisSummary: sessionMeta.diagnosisSummary || '(in progress)',
    ctaClicked: ctaClicked || 'none',
    transcript: transcript
  });
}
    removeTyping();
    history.push({ role: 'assistant', content: reply });
    const isFirst = history.length <= 2;
    const qr = isFirst ? ['Fashion brand, getting views but no sales', 'Beauty D2C, running ads but low ROI', 'Lifestyle brand, growing followers but zero revenue'] : [];
    addMessage('ai', reply, qr);
    if (diagnosisDelivered) {
      setTimeout(showLeadCapture, 600);
      setTimeout(showBookCallButton, 1200);
      diagnosisDelivered = false;
    }
  } catch(err) {
    removeTyping();
    addMessage('ai', 'Something went wrong connecting to the advisor. Please refresh and try again.');
  }
  isTyping = false; sendBtn.disabled = false; msgInput.focus();
}

setTimeout(() => {
  const mem = getUserMemory();
  saveUserMemory({});

  if (mem && mem.name) {
    const last = mem.diagnoses && mem.diagnoses[0];
    if (last) {
      const daysAgo = Math.floor((Date.now() - new Date(last.date)) / 86400000);
      const when = daysAgo === 0 ? 'earlier today' : daysAgo === 1 ? 'yesterday' : daysAgo + ' days ago';
      addMessage('ai',
        'Welcome back, <strong>' + mem.name + '</strong>!<br/><br/>' +
        when + ', we identified: <em>' + last.diagnosisSummary + '</em>.<br/><br/>' +
        'Has anything changed — or are you facing a new challenge?',
        ['Yes, new problem now', 'Still working on the same issue', 'Start a fresh diagnosis']
      );
    } else {
      const t = LANG[currentLang];
      addMessage('ai', t.greeting, t.chips);
    }
  } else {
    showWelcomeCapture();
  }
}, 400);

}, 400);
